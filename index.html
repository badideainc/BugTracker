<!DOCTYPE html>

<title>Bug Tracker</title>
<meta name="viewport" width="device-width, initial-scale=1.0"></meta>
<link rel="stylesheet" href="style.css"></link>
<link rel="stylesheet" href ="global.css"></link>

<section>
    <input type="text" id="fileTitle"><br><br>
</section>

<section id = "saveSection">
    <input type="file" id="importFile">
    <button id="exportFile">Export</button>
</section>
    
<section id="formSection">
    <div>
        <form id = "bugForm">
        <label for="fname">Title:</label>
        <input type="text" id="fname" name="fname"><br><br>
        <label for="fdescription">Description:</label>
        <input type="text" id="fdescription" name="fdescription"><br><br>
        <label for="fpriority">Priority:</label>
        <select id="fpriority" name="fpriority">
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
        </select><br><br> 
        </form>

        <button id="addButton">Add</button>   
    </div>
</section>

<section id = "tableSection">
    <div>
        <table>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Priority</th>           
                <th>Status</th>
            </tr>    
        </table>
    </div>
</section>


<script type="module" src="main.js"></script>
<script type="module" src="save.js"></script>
